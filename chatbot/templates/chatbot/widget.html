{% load static %}
<link rel="stylesheet" href="{% static 'chatbot/chatbot.css' %}">

<div id="cloots-chatbot">
  <button id="cloots-chatbot-toggle" aria-label="Open Cloots assistant">
    <span>💬</span>
  </button>

  <div id="cloots-chatbot-window" hidden>
    <div class="cc-header">
      <div>
        <strong>Cloots Assistant</strong>
        <small>Online · 24/7</small>
      </div>
      <button id="cloots-chatbot-close" aria-label="Close">×</button>
    </div>

    <div id="cloots-chatbot-messages" class="cc-messages">
      <div class="cc-msg bot">
        Hi! 👋 I'm the Cloots assistant. Ask me about orders, payments, shipping, returns or product prices.
      </div>
    </div>

    <form id="cloots-chatbot-form" class="cc-input">
      <input type="text" id="cloots-chatbot-input" placeholder="Type your question..." autocomplete="off" required>
      <button type="submit">Send</button>
    </form>
  </div>
</div>

<script>
  window.CLOOTS_CHATBOT_URL = "{% url 'chatbot:ask' %}";
</script>
<script src="{% static 'chatbot/chatbot.js' %}" defer></script>
